<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mi Dashboard - QR Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#222;padding:20px}
.header{max-width:800px;margin:0 auto 20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px}
.header h1 small{font-size:12px;font-weight:400;color:#888;display:block;margin-top:2px}
.stats{max-width:800px;margin:0 auto 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-card{background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat-card .num{font-size:28px;font-weight:900;color:#2563eb}
.stat-card .label{font-size:12px;color:#888;margin-top:4px}
.card{background:#fff;border-radius:14px;padding:20px;margin:0 auto 20px;max-width:800px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h2{font-size:15px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #eee}
.scan-table{width:100%;border-collapse:collapse;font-size:13px}
.scan-table th,.scan-table td{padding:8px 10px;text-align:left;border-bottom:1px solid #eee}
.scan-table th{font-weight:700;color:#888;font-size:11px;text-transform:uppercase}
.scan-table tr:hover td{background:#f8faff}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.badge-mobile{background:#dbeafe;color:#1d4ed8}
.badge-desktop{background:#f3e8ff;color:#7c3aed}
.empty{padding:40px;text-align:center;color:#888}
.login-box{max-width:360px;margin:80px auto;background:#fff;border-radius:16px;padding:30px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.login-box h1{font-size:22px;margin-bottom:6px;text-align:center}
.login-box p{text-align:center;color:#888;font-size:13px;margin-bottom:20px}
input{width:100%;padding:10px 12px;border:2px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px;outline:none;font-family:inherit;transition:border .2s}
input:focus{border-color:#2563eb}
.btn{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.btn:hover{background:#1d4ed8}
.error{color:#e74c3c;font-size:13px;margin-top:8px;display:none;text-align:center}
.logout{background:none;border:1px solid #ddd;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;color:#888;font-family:inherit}
.logout:hover{color:#e74c3c;border-color:#e74c3c}
.realtime-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#16a34a;margin-right:6px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h1>🔐 QR Tracker</h1>
  <p>Tu panel de control de escaneos</p>
  <input id="loginEmail" type="email" placeholder="Email" />
  <input id="loginPass" type="password" placeholder="Contraseña" />
  <button class="btn" onclick="login()">Ingresar</button>
  <div class="error" id="loginError">Email o contraseña incorrectos</div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <h1>📊 Mis QR <small id="clientName"></small></h1>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="num" id="totalScans">0</div><div class="label">Total escaneos</div></div>
    <div class="stat-card"><div class="num" id="todayScans">0</div><div class="label">Hoy</div></div>
    <div class="stat-card"><div class="num" id="mobilePct">0%</div><div class="label">Móvil</div></div>
  </div>

  <div class="card">
    <h2><span class="realtime-dot"></span>Escaneos en tiempo real</h2>
    <table class="scan-table">
      <thead><tr><th>Fecha</th><th>IP</th><th>Ubicación</th><th>Dispositivo</th></tr></thead>
      <tbody id="scanBody"></tbody>
    </table>
    <div class="empty" id="emptyState">Aún no has recibido escaneos. Comparte tus códigos QR para empezar.</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase-config.js"></script>
<script>
var _clientDocId=null;

function login(){
  var e=document.getElementById('loginEmail').value;
  var p=document.getElementById('loginPass').value;
  if(!e||!p){showLoginError('Ingresa email y contraseña');return}
  QR_AUTH.signInWithEmailAndPassword(e,p).then(function(user){
    findClient(user.user.uid,e);
  }).catch(function(err){
    showLoginError('Email o contraseña incorrectos');
  });
}

function findClient(uid,email){
  QR_DB.collection('clients').where('email','==',email).get().then(function(snap){
    if(snap.empty){
      showLoginError('No tienes un dashboard asociado. Contacta al administrador.');
      return;
    }
    snap.forEach(function(doc){_clientDocId=doc.id});
    document.getElementById('loginBox').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('clientName').textContent=snap.docs[0].data().name||'';
    loadScans();
  }).catch(function(err){
    showLoginError('Error de conexión');
  });
}

function showLoginError(msg){
  var el=document.getElementById('loginError');
  el.textContent=msg;el.style.display='block';
}

function logout(){
  QR_AUTH.signOut();location.reload();
}

var _todayStr=new Date().toISOString().slice(0,10);

function loadScans(){
  if(!_clientDocId) return;
  QR_DB.collection('clients').doc(_clientDocId).collection('scans')
    .orderBy('timestamp','desc').limit(100).onSnapshot(function(snap){
    var html='';
    var total=0,today=0,mobile=0;
    snap.forEach(function(doc){
      var d=doc.data();total++;
      var dt=d.timestamp?new Date(d.timestamp.seconds*1000).toLocaleString('es-CO'):'—';
      if(d.timestamp){
        var dStr=new Date(d.timestamp.seconds*1000).toISOString().slice(0,10);
        if(dStr===_todayStr) today++;
      }
      if(d.device==='Mobile') mobile++;
      var badge=d.device==='Mobile'?'<span class="badge badge-mobile">📱 Móvil</span>':'<span class="badge badge-desktop">💻 Escritorio</span>';
      html+='<tr><td style="white-space:nowrap">'+dt+'</td><td>'+esc(d.ip||'—')+'</td>'
        +'<td>'+[d.city,d.country].filter(Boolean).join(', ')+'</td>'
        +'<td>'+badge+' '+esc(d.os||'')+'</td></tr>';
    });
    document.getElementById('scanBody').innerHTML=html;
    document.getElementById('totalScans').textContent=total;
    document.getElementById('todayScans').textContent=today;
    document.getElementById('mobilePct').textContent=total?Math.round(mobile/total*100)+'%':'0%';
    document.getElementById('emptyState').style.display=total?'none':'block';
  });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
</body>
</html>
