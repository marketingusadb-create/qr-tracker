<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mi Panel - QR Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#e2e8f0;padding:20px;max-width:1000px;margin:0 auto;min-height:100vh}
#loginBox{max-width:400px;margin:80px auto;text-align:center;background:linear-gradient(145deg,#1e293b,#334155);border-radius:20px;padding:32px;border:1px solid rgba(255,255,255,.06);box-shadow:0 24px 80px rgba(0,0,0,.4)}
#loginBox h1{font-size:24px;margin-bottom:8px}
#loginBox p{font-size:13px;color:#94a3b8;margin-bottom:20px}
#loginBox input{margin-bottom:12px;text-align:center}
input,select,textarea{width:100%;padding:10px 12px;border:2px solid #475569;border-radius:10px;font-size:14px;margin-bottom:10px;outline:none;font-family:inherit;transition:all .3s;background:#1e293b;color:#e2e8f0}
input:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.2)}
.btn{padding:10px 20px;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .25s;font-family:inherit;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;width:100%}
.card{background:linear-gradient(145deg,#1e293b,#334155);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)}
.card h2{font-size:16px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.08);color:#f1f5f9}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.qr-item{text-align:center;padding:16px;background:linear-gradient(145deg,#1e293b,#2d3a50);border-radius:12px;border:1px solid rgba(255,255,255,.08)}
.qr-item img{width:100%;max-width:200px;border-radius:8px;display:block;margin:0 auto 8px}
.qr-item .label{font-size:12px;color:#94a3b8;margin-bottom:4px}
.scan-table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
.scan-table th,.scan-table td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap}
.scan-table th{font-weight:700;color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.scan-table tr:hover td{background:rgba(139,92,246,.08)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-mobile{background:rgba(59,130,246,.2);color:#60a5fa}
.badge-desktop{background:rgba(139,92,246,.2);color:#a78bfa}
.badge-active{background:rgba(16,185,129,.2);color:#34d399}
.badge-inactive{background:rgba(239,68,68,.2);color:#f87171}
.badge-type-whatsapp{background:rgba(16,185,129,.2);color:#34d399}
.badge-type-telegram{background:rgba(59,130,246,.2);color:#60a5fa}
.badge-type-sms{background:rgba(245,158,11,.2);color:#fbbf24}
.badge-type-teams{background:rgba(139,92,246,.2);color:#a78bfa}
.badge-new{background:rgba(59,130,246,.2);color:#60a5fa}
.badge-contacted{background:rgba(16,185,129,.2);color:#34d399}
.badge-closed{background:rgba(239,68,68,.2);color:#f87171}
#app{display:none}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.header h1{font-size:22px;background:linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,#1e293b,#334155);color:#e2e8f0;padding:14px 24px;border-radius:12px;font-size:13px;z-index:999;opacity:0;transform:translateY(20px);transition:all .3s;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06)}
.toast.show{opacity:1;transform:translateY(0)}
.license-warn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:16px;text-align:center;margin-bottom:20px;color:#f87171;font-weight:700}
.license-ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:12px 16px;text-align:center;margin-bottom:20px;color:#34d399;font-size:13px}
.error-box{background:rgba(239,68,68,.1);border-radius:12px;padding:20px;text-align:center;color:#f87171}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:10px 10px 0 0;border:none;font-weight:700;font-size:13px;cursor:pointer;background:rgba(255,255,255,.05);color:#94a3b8;font-family:inherit;transition:all .25s}
.tab:hover{background:rgba(255,255,255,.1);color:#e2e8f0}
.tab.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.tab-content{display:none;animation:fadeIn .3s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.status-bar{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.status-bar-item{background:linear-gradient(145deg,#1e293b,#2d3a50);border-radius:12px;padding:14px 18px;flex:1;min-width:120px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.status-bar-item .num{font-size:28px;font-weight:800;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.status-bar-item .lbl{font-size:11px;color:#94a3b8;margin-top:2px}
</style>
</head>
<body>

<div id="loginBox">
  <h1>🔐 Mi Panel</h1>
  <p>Ingresa tu email y contraseña para ver tus códigos QR y escaneos</p>
  <input id="loginEmail" type="email" placeholder="tu@email.com" />
  <input id="loginPass" type="password" placeholder="Contraseña" />
  <button class="btn btn-primary" onclick="login()">Ingresar</button>
  <div id="loginError" style="color:#f87171;font-size:13px;margin-top:10px;display:none"></div>
</div>

<div id="app">
  <div class="header">
    <h1 id="panelTitle">📊 Mi Panel</h1>
    <button class="btn btn-primary" style="width:auto;padding:6px 14px;font-size:12px" onclick="logout()">Cerrar sesión</button>
  </div>

  <div id="licenseStatus" class="license-ok" style="display:none"></div>

  <div class="status-bar" id="statsBar">
    <div class="status-bar-item"><div class="num" id="statLeads">0</div><div class="lbl">Leads</div></div>
    <div class="status-bar-item"><div class="num" id="statQrs">0</div><div class="lbl">QRs</div></div>
    <div class="status-bar-item"><div class="num" id="statHoy">0</div><div class="lbl">Hoy</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('scans',this)">📩 Escaneos</button>
    <button class="tab" onclick="switchTab('qrs',this)">📱 Mis QR</button>
  </div>

  <div id="tab-scans" class="tab-content active">
    <div class="card">
      <h2>📩 Escaneos recibidos</h2>
      <div style="overflow-x:auto"><div id="scansList"><p style="color:#888;text-align:center;padding:20px">Cargando...</p></div></div>
    </div>
  </div>

  <div id="tab-qrs" class="tab-content">
    <div class="card">
      <h2>📱 Mis Códigos QR</h2>
      <div style="margin-bottom:14px;display:flex;gap:4px;flex-wrap:wrap" id="qrTypeSelector">
        <button class="btn btn-sm btn-outline active" data-type="whatsapp" onclick="selectQrType(this)">💬 WhatsApp</button>
        <button class="btn btn-sm btn-outline" data-type="telegram" onclick="selectQrType(this)">✈️ Telegram</button>
        <button class="btn btn-sm btn-outline" data-type="sms" onclick="selectQrType(this)">📱 SMS</button>
        <button class="btn btn-sm btn-outline" data-type="teams" onclick="selectQrType(this)">💼 Teams</button>
      </div>
      <button class="btn btn-primary" onclick="generateClientQr()" style="margin-bottom:16px">➕ Generar QR nuevo</button>
      <div id="qrList"><p style="color:#888;text-align:center;padding:20px">Cargando...</p></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
var FBC={apiKey:"AIzaSyA6Mj4OyCzqAsk8iiT3JCcgOt3Gu1imOiE",authDomain:"qr-tracker-crm.firebaseapp.com",projectId:"qr-tracker-crm",storageBucket:"qr-tracker-crm.firebasestorage.app",messagingSenderId:"1085744853871",appId:"1:1085744853871:web:9a9f8413ee352ca55cae9a"};
firebase.initializeApp(FBC,"cpPanel");var DB=firebase.firestore(firebase.app("cpPanel"));
var _clientId=null,_clientData=null;

function $(id){return document.getElementById(id)}

function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function login(){
  var email=$('loginEmail').value.trim();
  var pass=$('loginPass').value;
  if(!email||!pass){$('loginError').textContent='Ingresa email y contraseña';$('loginError').style.display='block';return}
  $('loginError').style.display='none';
  DB.collection('clients').where('email','==',email).where('dashboardPass','==',pass).get().then(function(snap){
    if(snap.empty){$('loginError').textContent='Email o contraseña incorrectos';$('loginError').style.display='block';return}
    var doc=snap.docs[0];
    _clientId=doc.id;
    _clientData=doc.data();
    $('loginBox').style.display='none';
    $('app').style.display='block';
    $('panelTitle').textContent='📊 '+_clientData.name||'Mi Panel';
    checkLicense();
    loadScans();
    loadQrs();
  }).catch(function(err){$('loginError').textContent='Error de conexión';$('loginError').style.display='block';console.error(err)});
}

function checkLicense(){
  var ls=$('licenseStatus');
  if(_clientData.licenciaActiva){
    ls.style.display='block';
    ls.className='license-ok';
    ls.innerHTML='✅ Licencia activa' + (_clientData.licenciaVence?' hasta '+_clientData.licenciaVence:'');
  }else{
    ls.style.display='block';
    ls.className='license-warn';
    ls.innerHTML='⚠️ Tu licencia no está activa. Contacta a tu administrador para renovar.';
  }
}

function logout(){_clientId=null;_clientData=null;$('app').style.display='none';$('loginBox').style.display='block';$('loginEmail').value='';$('loginPass').value=''}

function switchTab(t,btn){
  document.querySelectorAll('.tab').forEach(function(e){e.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(e){e.classList.remove('active')});
  btn.classList.add('active');$('tab-'+t).classList.add('active');
}

function loadScans(){
  DB.collection('clients').doc(_clientId).collection('scans').orderBy('timestamp','desc').limit(50).get().then(function(snap){
    var html='<table class="scan-table"><thead><tr><th>Fecha</th><th>Nombre</th><th>Email / Tel</th><th>Mensaje</th><th>IP</th><th>Ubicación</th><th>Dispositivo</th><th>Estado</th></tr></thead><tbody>';
    var c=0,hoy=0;
    snap.forEach(function(doc){
      var d=doc.data();if(d.deleted)return;c++;
      var ts=d.timestamp?new Date(d.timestamp.seconds*1000):null;
      if(ts&&ts.toDateString()===new Date().toDateString()) hoy++;
      var st=d.status||'new';
      var ph=d.leadPhone||'';var em=d.leadEmail||'';
      var loc=[d.city,d.country].filter(Boolean).join(', ');
      var stCls=st==='contacted'?'badge-contacted':st==='closed'?'badge-closed':'badge-new';
      var stTxt=st==='contacted'?'📞 Contactado':st==='closed'?'✅ Cerrado':'🆕 Nuevo';
      html+='<tr'+(st==='closed'?' style="opacity:.5"':'')+'><td style="white-space:nowrap;font-size:11px">'+(ts?ts.toLocaleString('es-CO'):'—')+'</td>'
        +'<td><b>'+esc(d.leadName||'—')+'</b></td>'
        +'<td style="font-size:11px">'+(em?'📧 '+esc(em):'')+(ph?(em?'<br>':'')+'📱 '+esc(ph):'')+'</td>'
        +'<td style="font-size:11px;color:#94a3b8;max-width:150px;word-break:break-word">'+esc(d.leadMessage||'—')+'</td>'
        +'<td style="font-size:11px;color:#94a3b8">'+esc(d.ip||'—')+'</td>'
        +'<td style="font-size:11px;color:#94a3b8">'+esc(loc||'—')+(d.gpsLat?' <a href="https://www.google.com/maps?q='+d.gpsLat+','+d.gpsLng+'" target="_blank" style="color:#60a5fa;text-decoration:none">🗺</a>':'')+'</td>'
        +'<td style="font-size:11px;color:#94a3b8">'+esc(d.os||'—')+'</td>'
        +'<td><span class="badge '+stCls+'">'+stTxt+'</span></td></tr>';
    });
    html+='</tbody></table>';
    if(!c) html='<p style="color:#888;text-align:center;padding:20px">Aún no hay escaneos.</p>';
    $('scansList').innerHTML=html;
    $('statLeads').textContent=c;
    $('statHoy').textContent=hoy;
  }).catch(function(e){$('scansList').innerHTML='<p style="color:#f87171;text-align:center;padding:20px">Error al cargar escaneos.</p>';console.error(e)});
}

function loadQrs(){
  var baseUrl='https://marketingusadb-create.github.io/qr-tracker/index.html';
  var typeLabels={whatsapp:'💬 WhatsApp',telegram:'✈️ Telegram',sms:'📱 SMS',teams:'💼 Teams'};
  DB.collection('clients').doc(_clientId).collection('qrCodes').get().then(function(snap){
    var html='<div class="qr-grid">';
    var c=0;
    snap.forEach(function(doc){
      var d=doc.data();if(d.deleted)return;c++;
      var active=d.active!==false;
      var type=d.type||'whatsapp';
      var qrData=baseUrl+'?c='+_clientId+'&q='+doc.id+'&s='+type;
      var qrImg='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data='+encodeURIComponent(qrData);
      html+='<div class="qr-item">'
        +'<img src="'+qrImg+'" alt="QR" loading="lazy"/>'
        +'<div class="label">'+(typeLabels[type]||typeLabels.whatsapp)+' '+esc(d.label||doc.id)+'</div>'
        +'<div style="font-size:10px;color:#64748b;word-break:break-all;margin-top:4px">'+qrData+'</div>'
        +'<a href="'+qrImg+'" download="qr-'+doc.id+'.png" class="btn btn-sm btn-outline" style="margin-top:6px;padding:4px 10px;font-size:11px">⬇ Descargar</a>'
        +'</div>';
    });
    $('statQrs').textContent=c;
    html+='</div>';
    if(!c) html='<p style="color:#888;text-align:center;padding:20px">Aún no tienes códigos QR.</p>';
    $('qrList').innerHTML=html;
  }).catch(function(e){$('qrList').innerHTML='<p style="color:#f87171;text-align:center;padding:20px">Error al cargar QR.</p>';console.error(e)});
}

var _qrType='whatsapp';
function selectQrType(btn){
  document.querySelectorAll('#qrTypeSelector button').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');_qrType=btn.dataset.type;
}

function generateClientQr(){
  var qrId='qr_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  DB.collection('clients').doc(_clientId).collection('qrCodes').doc(qrId).set({
    label:qrId,active:true,type:_qrType,createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    toast('✅ QR '+_qrType+' generado');
    loadQrs();
  }).catch(function(err){toast('Error: '+err.message)});
}
</script>
</body>
</html>
